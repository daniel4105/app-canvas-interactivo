<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego de Círculos</title>
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>

    <div class="container">

        <h1>Simulación de Círculos</h1>
        <h2 id="level">Nivel 1</h2>

        <div class="stats glass">
            <p>🔴 Eliminados: <span id="removed">0</span> / 80</p>
            <p>📊 Progreso: <span id="percent">0%</span></p>
            <p>⏳ Siguiente nivel en: <span id="remaining">10</span></p>
        </div>

        <div class="canvas-container glass">
            <canvas id="canvasBounce" width="600" height="400"></canvas>
        </div>

    </div>

    <script src="./assets/js/main.js"></script>
</body>
</html>
