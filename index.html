<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego de Círculos</title>
</head>
<body style="background:#111; color:white; font-family:Arial; text-align:center;">

    <h2>Simulación de Círculos</h2>
    <h3 id="level">Nivel 1</h3>

    <div>
        <p>Círculos eliminados: <span id="removed">0</span> / 80</p>
        <p>Porcentaje: <span id="percent">0%</span></p>
        <p>Faltan para siguiente nivel: <span id="remaining">10</span></p>
    </div>

    <canvas id="canvasBounce" width="600" height="400"
        style="border:2px solid white; display:block; margin:20px auto;">
    </canvas>

    <script src="./assets/js/main.js"></script>

</body>
</html>
